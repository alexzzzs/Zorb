name: Compiler CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install runtime test toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user

      - name: Restore
        run: dotnet restore Zorb.Compiler.Tests/Zorb.Compiler.Tests.csproj

      - name: Build Compiler
        run: dotnet build Zorb.Compiler/Zorb.Compiler.csproj -c Release --no-restore

      - name: Run Fixture Suite
        run: dotnet run --project Zorb.Compiler.Tests/Zorb.Compiler.Tests.csproj --configuration Release

  windows-hosted-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      WINDOWS_SMOKE_FIXTURES: runtime_hello_world;runtime_string_escapes;runtime_condition_catch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore
        run: dotnet restore Zorb.Compiler.Tests/Zorb.Compiler.Tests.csproj

      - name: Build Compiler
        run: dotnet build Zorb.Compiler/Zorb.Compiler.csproj -c Release --no-restore

      - name: Build runtime fixtures on Windows host
        shell: pwsh
        run: |
          $fixtures = $env:WINDOWS_SMOKE_FIXTURES -split ';' | Where-Object { $_ }

          $outDir = Join-Path $env:RUNNER_TEMP "zorb-windows-build"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          foreach ($fixture in $fixtures) {
            $exePath = Join-Path $outDir "$fixture.exe"
            dotnet run --project Zorb.Compiler/Zorb.Compiler.csproj --configuration Release --no-build -- build "Zorb.Compiler.Tests/fixtures/$fixture/main.zorb" -o $exePath
            $exitCode = $LASTEXITCODE
            if ($exitCode -ne 0) {
              throw "Build for $fixture failed with exit code $exitCode. Expected executable at $exePath."
            }
            if (-not (Test-Path $exePath)) {
              throw "Build for $fixture did not produce the expected executable at $exePath."
            }
          }

      - name: Run runtime fixtures on Windows host
        shell: pwsh
        run: |
          $fixtures = $env:WINDOWS_SMOKE_FIXTURES -split ';' | Where-Object { $_ }

          function Read-NormalizedText([string]$Path) {
            if (-not (Test-Path $Path)) {
              return ""
            }

            return [System.IO.File]::ReadAllText($Path).Replace("`r`n", "`n")
          }

          foreach ($fixture in $fixtures) {
            $fixtureDir = "Zorb.Compiler.Tests/fixtures/$fixture"
            $expectedStdout = Read-NormalizedText (Join-Path $fixtureDir "expect-stdout.txt")
            $expectedExit = [int]([System.IO.File]::ReadAllText((Join-Path $fixtureDir "expect-exit.txt")).Trim())

            $builtStdoutPath = Join-Path $env:RUNNER_TEMP "$fixture-built-stdout.txt"
            $builtStderrPath = Join-Path $env:RUNNER_TEMP "$fixture-built-stderr.txt"
            $exePath = Join-Path (Join-Path $env:RUNNER_TEMP "zorb-windows-build") "$fixture.exe"
            $builtProcess = Start-Process $exePath -NoNewWindow -Wait -PassThru -RedirectStandardOutput $builtStdoutPath -RedirectStandardError $builtStderrPath
            $actualBuiltStdout = Read-NormalizedText $builtStdoutPath

            if ($builtProcess.ExitCode -ne $expectedExit) {
              $stderr = Read-NormalizedText $builtStderrPath
              throw "Expected built $fixture exit code $expectedExit but got $($builtProcess.ExitCode).`nSTDERR:`n$stderr`nSTDOUT:`n$actualBuiltStdout"
            }

            if ($actualBuiltStdout -ne $expectedStdout) {
              throw "Built $fixture stdout mismatch.`nExpected:`n$expectedStdout`nActual:`n$actualBuiltStdout"
            }

            $stdoutPath = Join-Path $env:RUNNER_TEMP "$fixture-run-stdout.txt"
            $stderrPath = Join-Path $env:RUNNER_TEMP "$fixture-run-stderr.txt"
            $arguments = @(
              "run",
              "--project", "Zorb.Compiler/Zorb.Compiler.csproj",
              "--configuration", "Release",
              "--no-build",
              "--",
              "run",
              "$fixtureDir/main.zorb"
            )

            $process = Start-Process dotnet -ArgumentList $arguments -NoNewWindow -Wait -PassThru -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath
            $actualStdout = Read-NormalizedText $stdoutPath

            if ($process.ExitCode -ne $expectedExit) {
              $stderr = Read-NormalizedText $stderrPath
              throw "Expected CLI $fixture exit code $expectedExit but got $($process.ExitCode).`nSTDERR:`n$stderr`nSTDOUT:`n$actualStdout"
            }

            if ($actualStdout -ne $expectedStdout) {
              throw "CLI $fixture stdout mismatch.`nExpected:`n$expectedStdout`nActual:`n$actualStdout"
            }
          }

  publish-standalone:
    needs:
      - test
      - windows-hosted-smoke
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: zorb-compiler-linux-x64
          - os: windows-latest
            artifact_name: zorb-compiler-win-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute version metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short=8 HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            informational_version="$version"
          else
            base_version="0.1.3"
            version="${base_version}-dev.${GITHUB_RUN_NUMBER}"
            informational_version="${version}+${short_sha}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "informational_version=$informational_version" >> "$GITHUB_OUTPUT"

      - name: Publish standalone compiler
        if: matrix.os == 'ubuntu-latest'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          INFORMATIONAL_VERSION: ${{ steps.version.outputs.informational_version }}
        run: bash scripts/publish-compiler-linux.sh "artifacts/compiler/linux-x64"

      - name: Publish standalone compiler
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          INFORMATIONAL_VERSION: ${{ steps.version.outputs.informational_version }}
        run: ./scripts/publish-compiler-windows.ps1 "artifacts/compiler/win-x64"

      - name: Record version metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/compiler
          cat > "artifacts/compiler/version.txt" <<EOF
          version=${{ steps.version.outputs.version }}
          informational_version=${{ steps.version.outputs.informational_version }}
          commit=${GITHUB_SHA}
          ref=${GITHUB_REF}
          EOF

      - name: Upload standalone compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/compiler
