name: Compiler Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Compiler
        run: dotnet restore Zorb.Compiler/Zorb.Compiler.csproj

      - name: Restore Tests
        run: dotnet restore Zorb.Compiler.Tests/Zorb.Compiler.Tests.csproj

      - name: Build Compiler
        run: dotnet build Zorb.Compiler/Zorb.Compiler.csproj -c Release --no-restore

      - name: Build Tests
        run: dotnet build Zorb.Compiler.Tests/Zorb.Compiler.Tests.csproj -c Release --no-restore

      - name: Run Fixture Suite
        run: dotnet run --project Zorb.Compiler.Tests/Zorb.Compiler.Tests.csproj --no-build --configuration Release
