name: Compiler CI

on:
  push:
  pull_request:

jobs:
  test:
    name: linux-hosted-x64
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install runtime test toolchains
        run: |
          . /etc/os-release
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev lld-21 g++

      - name: Install Zig 0.16
        run: |
          curl -fsSLo zig.tar.xz https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            backend/llvm/.zig-cache
            ~/.cache/zig
          key: ${{ runner.os }}-zig-0.16.0-llvm21-${{ hashFiles('backend/llvm/build.zig', 'backend/llvm/src/**', 'backend/llvm/include/**') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.16.0-llvm21-

      - name: Build LLVM backend
        run: |
          cd backend/llvm
          zig build test
          zig build -Dstatic-llvm=true -Dcxx-runtime="$(g++ -print-file-name=libstdc++.so)" -Doptimize=ReleaseSafe

      - name: Restore
        run: dotnet restore tests/csharp/Zorb.Compiler.Tests.csproj

      - name: Build Compiler
        run: dotnet build seed/csharp/Zorb.Compiler.csproj -c Release --no-restore

      - name: Run Fixture Suite
        run: dotnet run --project tests/csharp/Zorb.Compiler.Tests.csproj --configuration Release

  linux-aarch64-cross:
    name: linux-aarch64-cross
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ZORB_RUN_AARCH64_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install AArch64 cross-runtime toolchains
        run: |
          . /etc/os-release
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev lld-21 g++ gcc-aarch64-linux-gnu libc6-dev-arm64-cross qemu-user

      - name: Install Zig 0.16
        run: |
          curl -fsSLo zig.tar.xz https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            backend/llvm/.zig-cache
            ~/.cache/zig
          key: ${{ runner.os }}-zig-0.16.0-llvm21-${{ hashFiles('backend/llvm/build.zig', 'backend/llvm/src/**', 'backend/llvm/include/**') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.16.0-llvm21-

      - name: Build LLVM backend
        run: |
          cd backend/llvm
          zig build test
          zig build -Dstatic-llvm=true -Dcxx-runtime="$(g++ -print-file-name=libstdc++.so)" -Doptimize=ReleaseSafe

      - name: Restore
        run: dotnet restore tests/csharp/Zorb.Compiler.Tests.csproj

      - name: Build Compiler
        run: dotnet build seed/csharp/Zorb.Compiler.csproj -c Release --no-restore

      - name: Run Fixture Suite With AArch64 Lane
        run: dotnet run --project tests/csharp/Zorb.Compiler.Tests.csproj --configuration Release

  linux-native-parity:
    name: linux-native-frontend-parity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ZORB_FRONTEND_PARITY_ONLY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install frontend bootstrap toolchains
        run: |
          . /etc/os-release
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev lld-21 g++
          curl -fsSLo zig.tar.xz https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - name: Build LLVM backend
        run: |
          cd backend/llvm
          zig build -Dstatic-llvm=true -Dcxx-runtime="$(g++ -print-file-name=libstdc++.so)" -Doptimize=ReleaseSafe

      - name: Restore and build stage 0
        run: |
          dotnet restore tests/csharp/Zorb.Compiler.Tests.csproj
          dotnet build tests/csharp/Zorb.Compiler.Tests.csproj -c Release --no-restore

      - name: Run native frontend parity gate
        run: dotnet run --project tests/csharp/Zorb.Compiler.Tests.csproj --configuration Release --no-build

  windows-hosted-smoke:
    name: windows-hosted-x64
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install LLVM 21 and Zig 0.16
        shell: pwsh
        run: |
          choco install llvm --version=21.1.8 -y --no-progress
          Invoke-WebRequest https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip -OutFile zig.zip
          Expand-Archive zig.zip -DestinationPath .
          "$PWD/zig-x86_64-windows-0.16.0" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$env:ProgramFiles\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            backend/llvm/.zig-cache
            ~\AppData\Local\zig
          key: ${{ runner.os }}-zig-0.16.0-llvm21-${{ hashFiles('backend/llvm/build.zig', 'backend/llvm/src/**', 'backend/llvm/include/**') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.16.0-llvm21-

      - name: Discover LLVM library paths
        shell: pwsh
        run: |
          $llvmPrefix = if (Test-Path "$env:ProgramFiles\LLVM") {
            Resolve-Path "$env:ProgramFiles\LLVM"
          } else {
            throw "LLVM install root was not found under $env:ProgramFiles\LLVM"
          }

          $llvmLib = Get-ChildItem -Path $llvmPrefix -Filter LLVM-C.lib -Recurse -File -ErrorAction Stop |
            Select-Object -First 1
          if ($null -eq $llvmLib) {
            throw "Unable to find LLVM-C.lib under $llvmPrefix"
          }

          "LLVM_PREFIX=$llvmPrefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_LIB_DIR=$(Split-Path $llvmLib.FullName -Parent)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build LLVM backend
        shell: pwsh
        run: |
          Set-Location backend/llvm
          zig build test
          zig build "-Dllvm-prefix=$env:LLVM_PREFIX" "-Dllvm-lib-dir=$env:LLVM_LIB_DIR" "-Dllvm-library=LLVM-C" "-Doptimize=ReleaseSafe"

      - name: Restore
        run: dotnet restore tests/csharp/Zorb.Compiler.Tests.csproj

      - name: Build Compiler
        run: dotnet build seed/csharp/Zorb.Compiler.csproj -c Release --no-restore

      - name: Run Fixture Suite
        run: dotnet run --project tests/csharp/Zorb.Compiler.Tests.csproj --configuration Release

  publish-standalone:
    needs:
      - test
      - linux-aarch64-cross
      - linux-native-parity
      - windows-hosted-smoke
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: zorb-compiler-linux-x64
          - os: windows-latest
            artifact_name: zorb-compiler-win-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install release toolchain
        if: matrix.os == 'ubuntu-latest'
        run: |
          . /etc/os-release
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev lld-21 g++
          curl -fsSLo zig.tar.xz https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - name: Install release toolchain
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install llvm --version=21.1.8 -y --no-progress
          Invoke-WebRequest https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip -OutFile zig.zip
          Expand-Archive zig.zip -DestinationPath .
          "$PWD/zig-x86_64-windows-0.16.0" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$env:ProgramFiles\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache Zig build artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: |
            backend/llvm/.zig-cache
            ~/.cache/zig
          key: ${{ runner.os }}-zig-0.16.0-llvm21-${{ hashFiles('backend/llvm/build.zig', 'backend/llvm/src/**', 'backend/llvm/include/**') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.16.0-llvm21-

      - name: Cache Zig build artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            backend/llvm/.zig-cache
            ~\AppData\Local\zig
          key: ${{ runner.os }}-zig-0.16.0-llvm21-${{ hashFiles('backend/llvm/build.zig', 'backend/llvm/src/**', 'backend/llvm/include/**') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.16.0-llvm21-

      - name: Compute version metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short=8 HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            informational_version="$version"
          else
            base_version="$(dotnet msbuild seed/csharp/Zorb.Compiler.csproj -getProperty:Version -nologo -v:q | tail -n 1 | tr -d '\r')"
            version="${base_version}.${GITHUB_RUN_NUMBER}"
            informational_version="${version}+${short_sha}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "informational_version=$informational_version" >> "$GITHUB_OUTPUT"

      - name: Publish standalone compiler
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/publish-compiler-linux.sh "artifacts/compiler/linux-x64"

      - name: Publish standalone compiler
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/publish-compiler-windows.ps1 "artifacts/compiler/win-x64"

      - name: Record version metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/compiler
          cat > "artifacts/compiler/version.txt" <<EOF
          version=${{ steps.version.outputs.version }}
          informational_version=${{ steps.version.outputs.informational_version }}
          commit=${GITHUB_SHA}
          ref=${GITHUB_REF}
          EOF

      - name: Smoke test published compiler
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            compiler="artifacts/compiler/linux-x64/zorb"
            executable="/tmp/zorb-release-smoke"
          else
            compiler="artifacts/compiler/win-x64/zorb.exe"
            executable="$RUNNER_TEMP/zorb-release-smoke.exe"
          fi
          "$compiler" check compiler/driver/main.zorb
          "$compiler" build tests/csharp/fixtures/runtime_hello_world/main.zorb --output-kind llvm-ir -o "$RUNNER_TEMP/zorb-release-smoke.ll"
          "$compiler" build tests/csharp/fixtures/runtime_hello_world/main.zorb -o "$executable"
          test -s "$RUNNER_TEMP/zorb-release-smoke.ll"
          test -s "$executable"
          test "$("$executable")" = "ok"

      - name: Upload standalone compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/compiler
