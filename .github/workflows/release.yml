name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: zorb-release-linux-x64
            output_dir: artifacts/compiler/linux-x64
            asset_name: zorb-compiler-linux-x64-${{ github.ref_name }}.zip
          - os: windows-latest
            artifact_name: zorb-release-win-x64
            output_dir: artifacts/compiler/win-x64
            asset_name: zorb-compiler-win-x64-${{ github.ref_name }}.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install release toolchain
        if: matrix.os == 'ubuntu-latest'
        run: |
          . /etc/os-release
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y llvm-21-dev g++
          curl -fsSLo zig.tar.xz https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            backend/llvm/.zig-cache
            ~/.cache/zig
          key: release-${{ runner.os }}-zig-0.16.0-llvm21-${{ hashFiles('backend/llvm/build.zig', 'backend/llvm/src/**', 'backend/llvm/include/**') }}
          restore-keys: |
            release-${{ runner.os }}-zig-0.16.0-llvm21-

      - name: Install release toolchain
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install llvm --version=21.1.8 -y --no-progress
          Invoke-WebRequest https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip -OutFile zig.zip
          Expand-Archive zig.zip -DestinationPath .
          "$PWD/zig-x86_64-windows-0.16.0" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$env:ProgramFiles\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            backend/llvm/.zig-cache
            ~\AppData\Local\zig
          key: release-${{ runner.os }}-zig-0.16.0-llvm21-${{ hashFiles('backend/llvm/build.zig', 'backend/llvm/src/**', 'backend/llvm/include/**') }}
          restore-keys: |
            release-${{ runner.os }}-zig-0.16.0-llvm21-

      - name: Discover LLVM library paths
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $llvmPrefix = if (Test-Path "$env:ProgramFiles\LLVM") {
            Resolve-Path "$env:ProgramFiles\LLVM"
          } else {
            throw "LLVM install root was not found under $env:ProgramFiles\LLVM"
          }

          $llvmLib = Get-ChildItem -Path $llvmPrefix -Filter LLVM-C.lib -Recurse -File -ErrorAction Stop |
            Select-Object -First 1
          if ($null -eq $llvmLib) {
            throw "Unable to find LLVM-C.lib under $llvmPrefix"
          }

          "LLVM_PREFIX=$llvmPrefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_LIB_DIR=$(Split-Path $llvmLib.FullName -Parent)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compute release version metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish standalone compiler
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/publish-compiler-linux.sh "${{ matrix.output_dir }}"

      - name: Publish standalone compiler
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./scripts/publish-compiler-windows.ps1 "${{ matrix.output_dir }}"

      - name: Write version metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ matrix.output_dir }}/version.txt" <<EOF
          version=${{ steps.version.outputs.version }}
          tag=${GITHUB_REF_NAME}
          commit=${GITHUB_SHA}
          EOF

      - name: Smoke test release directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            compiler="${{ matrix.output_dir }}/zorb"
            executable="$RUNNER_TEMP/zorb-release-smoke"
          else
            compiler="${{ matrix.output_dir }}/zorb.exe"
            executable="$RUNNER_TEMP/zorb-release-smoke.exe"
          fi
          "$compiler" check compiler/driver/main.zorb
          "$compiler" build tests/csharp/fixtures/runtime_hello_world/main.zorb --output-kind llvm-ir -o "$RUNNER_TEMP/zorb-release-smoke.ll"
          "$compiler" build tests/csharp/fixtures/runtime_hello_world/main.zorb -o "$executable"
          test -s "$RUNNER_TEMP/zorb-release-smoke.ll"
          test -s "$executable"
          test "$("$executable")" = "ok"

      - name: Package release asset
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release-assets
          cd "${{ matrix.output_dir }}"
          zip -r "../../../release-assets/${{ matrix.asset_name }}" .

      - name: Package release asset
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive -Path "${{ matrix.output_dir }}/*" -DestinationPath "release-assets/${{ matrix.asset_name }}" -Force

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/${{ matrix.asset_name }}

  create-release:
    needs: build-release-assets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
