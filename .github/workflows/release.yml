name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: zorb-release-linux-x64
            output_dir: artifacts/compiler/linux-x64
            asset_name: zorb-compiler-linux-x64-${{ github.ref_name }}.zip
          - os: windows-latest
            artifact_name: zorb-release-win-x64
            output_dir: artifacts/compiler/win-x64
            asset_name: zorb-compiler-win-x64-${{ github.ref_name }}.zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install release toolchain
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-20-dev lld-20 g++
          curl -fsSLo zig.tar.xz https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> "$GITHUB_PATH"

      - name: Install release toolchain
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install llvm --version=20.1.8 -y --no-progress
          Invoke-WebRequest https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip -OutFile zig.zip
          Expand-Archive zig.zip -DestinationPath .
          "$PWD/zig-x86_64-windows-0.16.0" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$env:ProgramFiles\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Discover LLVM paths
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $llvmPrefix = if (Test-Path "$env:ProgramFiles\LLVM") {
            Resolve-Path "$env:ProgramFiles\LLVM"
          } else {
            throw "LLVM install root was not found under $env:ProgramFiles\LLVM"
          }

          $llvmHeader = Get-ChildItem -Path $llvmPrefix -Filter Analysis.h -Recurse -File -ErrorAction Stop |
            Where-Object { $_.FullName -like "*llvm-c\Analysis.h" } |
            Select-Object -First 1
          if ($null -eq $llvmHeader) {
            throw "Unable to find llvm-c/Analysis.h under $llvmPrefix"
          }

          $llvmLib = Get-ChildItem -Path $llvmPrefix -Filter LLVM-C.lib -Recurse -File -ErrorAction Stop |
            Select-Object -First 1
          if ($null -eq $llvmLib) {
            throw "Unable to find LLVM-C.lib under $llvmPrefix"
          }

          "LLVM_PREFIX=$llvmPrefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_INCLUDE_DIR=$(Split-Path (Split-Path $llvmHeader.FullName -Parent) -Parent)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_LIB_DIR=$(Split-Path $llvmLib.FullName -Parent)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compute release version metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish standalone compiler
        if: matrix.os == 'ubuntu-latest'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          INFORMATIONAL_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/publish-compiler-linux.sh "${{ matrix.output_dir }}"

      - name: Publish standalone compiler
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          INFORMATIONAL_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/publish-compiler-windows.ps1 "${{ matrix.output_dir }}"

      - name: Write version metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ matrix.output_dir }}/version.txt" <<EOF
          version=${{ steps.version.outputs.version }}
          tag=${GITHUB_REF_NAME}
          commit=${GITHUB_SHA}
          EOF

      - name: Smoke test release directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            compiler="${{ matrix.output_dir }}/Zorb.Compiler"
          else
            compiler="${{ matrix.output_dir }}/Zorb.Compiler.exe"
          fi
          "$compiler" --emit-llvm Zorb.Compiler.Tests/fixtures/runtime_hello_world/main.zorb -o "$RUNNER_TEMP/zorb-release-smoke.ll"
          "$compiler" build Zorb.Compiler.Tests/fixtures/bare_metal_debug_port/main.zorb --target bare-metal-x86_64 -o "$RUNNER_TEMP/zorb-release-smoke.elf"
          test -s "$RUNNER_TEMP/zorb-release-smoke.ll"
          test -s "$RUNNER_TEMP/zorb-release-smoke.elf"

      - name: Package release asset
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release-assets
          cd "${{ matrix.output_dir }}"
          zip -r "../../../release-assets/${{ matrix.asset_name }}" .

      - name: Package release asset
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive -Path "${{ matrix.output_dir }}/*" -DestinationPath "release-assets/${{ matrix.asset_name }}" -Force

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/${{ matrix.asset_name }}

  create-release:
    needs: build-release-assets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
